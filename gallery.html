<!DOCTYPE html>
<html>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
}

.header {
  text-align: center;
  padding: 32px;
}

.row {
  display: -ms-flexbox; /* IE10 */
  display: flex;
  -ms-flex-wrap: wrap; /* IE10 */
  flex-wrap: wrap;
  padding: 0 4px;
}

/* Create four equal columns that sits next to each other */
.column {
  -ms-flex: 25%; /* IE10 */
  flex: 25%;
  max-width: 25%;
  padding: 0 4px;
}

.column img {
  margin-top: 8px;
  vertical-align: middle;
  width: 100%;
}

/* Responsive layout - makes a two column-layout instead of four columns */
@media screen and (max-width: 800px) {
  .column {
    -ms-flex: 50%;
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .column {
    -ms-flex: 100%;
    flex: 100%;
    max-width: 100%;
  }
}
</style>
<body>

<!-- Header -->
<div class="header">
  <h1>Our Gallery</h1>
  <p>“Coming together is a beginning, staying together is progress, working together is success.”</p>
</div>

<!-- Photo Grid -->
<div class="row">

    <img src="We1.jpg" style="width:100%">

    <img src="We8.jpg" style="width:100%">
  </div>
  <div class="column">

    <img src="We5.jpg" style="width:100%">
    <img src="We6.jpg" style="width:100%">
    <img src="We10.jpg" style="width:100%">
    <img src="We11.jpg" style="width:100%">
    <img src="We12.jpg" style="width:100%">
  </div>  
  <div class="column">
    <img src="We7.jpg" style="width:100%">
    <img src="We8.jpg" style="width:100%">
    <img src="We9.jpg" style="width:100%">
    <img src="We4.jpg" style="width:100%">
    <img src="We5.jpg" style="width:100%">

  </div>
  <div class="column">

</html>
