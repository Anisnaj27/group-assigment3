* {box-sizing: border-box;}

.gallery{
  display: flex;
  justify-content: center;

.container {
  position: relative;
  width: 200px;
}

.image {
  position: relative;
  display: block;
  width: 200px;
  height: 350px;
}

.overlay {
  position: absolute; 
  bottom: 0; 
  background: rgb(0, 0, 0);
  background: rgba(0, 0, 0, 0.5); /* Black see-through */
  color: #f1f1f1; 
  width: 100%;
  transition: .5s ease;
  opacity:0;
  color: white;
  font-size: 20px;
  padding: 20px;
  text-align: center;
}

.container:hover .overlay {
  opacity: 1;
}


.testbtn {
  background-color: #ad9410;
  color: white;
  font-size: 15px;
  padding: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.testbtn:hover {
  background-color: #d6c610;
}
</style>
